# CRM Link Table
# Used by Claude to add links when people or companies are mentioned in blog posts or landing pages.
# One link per entity per post is enough — link on first mention only.
#
# Fields:
#   name        — canonical display name
#   aliases     — alternate spellings, abbreviations, or informal references to match against
#   type        — person | company | project | institution
#   url         — primary link (personal site or internal path)
#   linkedin    — LinkedIn profile (optional, for people)
#   external    — external product URL (optional, for projects with both internal and external pages)
#   context     — short note on who/what this is, for matching ambiguous mentions

